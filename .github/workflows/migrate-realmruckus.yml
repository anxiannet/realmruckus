name: Migrate Realm Ruckus project

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/migrate-realmruckus.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Stop if migration is complete
        id: guard
        run: |
          if [ -f .migration-complete ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Clone source repository
        if: steps.guard.outputs.skip != 'true'
        run: git clone --depth 1 https://github.com/anxiannet/qiangdipan.git /tmp/qiangdipan

      - name: Rebuild target structure
        if: steps.guard.outputs.skip != 'true'
        run: |
          set -e
          mkdir -p 文档 public/assets/visual-anchor

          # Remove partial root-level document copies created before the final structure was confirmed.
          find . -maxdepth 1 -type f -name 'Realm Ruckus*.md' -delete

          # Copy all source project files into the documentation directory first.
          cp -a '/tmp/qiangdipan/皮肤主题/Realm Ruckus/.' 文档/

          # Website root owns deployable assets. Keep the documentation copy as historical source,
          # and expose the current visual anchor from public/assets for site use.
          if [ -f '文档/视觉锚点/Realm Ruckus-整套卡牌视觉锚点海报-v1.png' ]; then
            cp '文档/视觉锚点/Realm Ruckus-整套卡牌视觉锚点海报-v1.png' \
               'public/assets/visual-anchor/realm-ruckus-visual-anchor-v1.png'
          fi

          cat > README.md <<'EOF'
          # Realm Ruckus

          `Realm Ruckus` is an independent English fantasy card-game project derived from the mechanics of 《夕妖：抢地盘》.

          ## Repository structure

          ```text
          /
          ├── README.md
          ├── index.html and future website source files
          ├── public/
          │   └── assets/
          │       └── visual-anchor/
          └── 文档/
              ├── README.md
              ├── Realm Ruckus主题方案.md
              ├── Realm Ruckus世界观规范.md
              ├── Realm Ruckus品牌检索记录.md
              ├── Realm Ruckus品牌与Logo规范.md
              ├── Realm Ruckus标准版卡表.md
              ├── Realm Ruckus英文核心规则.md
              ├── Realm Ruckus英文游戏手册.md
              ├── Realm Ruckus英文指南卡.md
              ├── Realm Ruckus视觉与UI规范.md
              ├── Realm Ruckus单卡美术方案.md
              ├── Realm Ruckus包装规范.md
              ├── Realm Ruckus制作与审核流程.md
              └── 视觉锚点/
          ```

          ## Source relationship

          Original mechanics repository:

          ```text
          https://github.com/anxiannet/qiangdipan
          ```

          The original repository remains the authoritative source for shared mechanics and retains a migration index. Realm Ruckus-specific documents and assets are maintained here after migration.
          EOF

          cat > index.html <<'EOF'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width,initial-scale=1">
            <title>Realm Ruckus</title>
            <meta name="description" content="Realm Ruckus — Monsters. Mischief. Total Takeover.">
            <style>
              html,body{margin:0;min-height:100%;background:#17131e;color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
              main{min-height:100vh;display:grid;place-items:center;padding:32px;box-sizing:border-box}
              img{display:block;max-width:min(100%,900px);height:auto;border-radius:18px;box-shadow:0 24px 80px rgba(0,0,0,.55)}
            </style>
          </head>
          <body><main><img src="/assets/visual-anchor/realm-ruckus-visual-anchor-v1.png" alt="Realm Ruckus visual anchor poster"></main></body>
          </html>
          EOF

          touch .migration-complete

      - name: Commit migration
        if: steps.guard.outputs.skip != 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m '迁移Realm Ruckus项目并建立网站根目录' || exit 0
          git push
